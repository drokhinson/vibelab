<!DOCTYPE html>
<html lang="en" data-theme="luxury">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoardgameBuddy</title>

  <!-- DaisyUI v4 + Tailwind CSS (no build step) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons (SVG icon set) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Supabase JS Client (for auth) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Fonts: Inter + Playfair Display (board game aesthetic) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" />

  <!-- Project styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="max-w-lg mx-auto min-h-screen flex flex-col pb-20">

    <!-- Top bar -->
    <header class="hidden sticky top-0 z-30 bg-base-100/95 backdrop-blur px-4 py-3 flex items-center justify-between border-b border-base-300" data-auth-only>
      <h1 class="text-lg font-bold font-display flex items-center gap-2"><i data-lucide="dice-6" class="w-5 h-5"></i> BoardgameBuddy</h1>
      <div class="flex items-center gap-2">
        <span id="profile-name" class="text-sm text-base-content/60"></span>
        <button class="btn btn-ghost btn-sm btn-circle" onclick="handleLogout()" title="Log out">
          <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
      </div>
    </header>

    <!-- Auth View -->
    <main data-view="auth" id="auth-container" class="flex-1 px-4 py-4"></main>

    <!-- Browse Games View (reached via + Add Game on Closet) -->
    <main data-view="browse" class="hidden flex-1 px-4 py-4">
      <div class="flex items-center gap-2 mb-3">
        <button class="btn btn-ghost btn-sm btn-square" onclick="showView('closet')" title="Back to closet">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
        </button>
        <h2 class="text-lg font-bold">Add a Game</h2>
      </div>
      <form id="game-search-form" class="mb-4">
        <div class="join w-full">
          <input type="text" id="game-search-input" class="input input-bordered join-item w-full" placeholder="Search games..." />
          <button type="submit" class="btn btn-primary join-item">
            <i data-lucide="search" class="w-4 h-4"></i>
          </button>
        </div>
      </form>

      <!-- BGG Live Search -->
      <details class="collapse collapse-arrow bg-base-200 mb-4">
        <summary class="collapse-title text-sm font-medium">
          <i data-lucide="globe" class="w-4 h-4 inline mr-1"></i> Search BoardGameGeek
        </summary>
        <div class="collapse-content">
          <div class="flex gap-2 mb-2">
            <input type="text" id="bgg-search-input" class="input input-bordered input-sm flex-1" placeholder="Search BGG..." />
            <button class="btn btn-sm btn-outline" onclick="searchBGG()">Search</button>
          </div>
          <div id="bgg-results"></div>
        </div>
      </details>

      <div id="games-grid"></div>
    </main>

    <!-- Closet View (home) -->
    <main data-view="closet" class="hidden flex-1 px-4 py-4">
      <div class="flex items-center justify-between mb-3 gap-2">
        <h2 class="text-xl font-bold font-display flex items-center gap-2">
          <i data-lucide="library-big" class="w-5 h-5"></i> My Closet
        </h2>
        <button id="closet-add-btn" class="btn btn-primary btn-sm">
          <i data-lucide="plus" class="w-4 h-4"></i> Add Game
        </button>
      </div>
      <!-- Tabs: Collection | Wishlist -->
      <div role="tablist" class="tabs tabs-boxed mb-3">
        <button role="tab" id="tab-collection" class="tab tab-active" onclick="switchClosetTab('collection')"><i data-lucide="library-big" class="w-4 h-4 mr-1"></i> Collection</button>
        <button role="tab" id="tab-wishlist" class="tab" onclick="switchClosetTab('wishlist')"><i data-lucide="star" class="w-4 h-4 mr-1"></i> Wishlist</button>
      </div>
      <!-- Collection controls (hidden on wishlist tab) -->
      <div class="flex items-center gap-2 mb-3" id="closet-controls">
        <input type="text" id="closet-search" class="input input-bordered input-sm flex-1" placeholder="Search your games..." />
        <select id="closet-sort" class="select select-bordered select-sm">
          <option value="alphabetical">A → Z</option>
          <option value="last_played">Last Played</option>
        </select>
        <button id="closet-view-toggle" class="btn btn-sm btn-ghost btn-square" title="Toggle view">
          <i data-lucide="list" class="w-4 h-4"></i>
        </button>
      </div>
      <div id="closet-shelves"></div>
      <div id="closet-list" class="hidden"></div>
      <div id="closet-wishlist" class="hidden"></div>
    </main>

    <!-- Game Detail View -->
    <main data-view="game-detail" class="hidden flex-1 px-4 py-4">
      <div id="game-detail-content"></div>
    </main>

    <!-- Log Play View -->
    <main data-view="log-play" class="hidden flex-1 px-4 py-4">
      <div id="log-play-content"></div>
    </main>

    <!-- Play History View -->
    <main data-view="history" class="hidden flex-1 px-4 py-4">
      <h2 class="text-xl font-bold mb-3 flex items-center gap-2">
        <i data-lucide="history" class="w-5 h-5"></i> Play History
      </h2>
      <div id="history-content"></div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast toast-end toast-top hidden z-50"></div>

    <!-- Bottom Navigation -->
    <nav class="hidden btm-nav btm-nav-sm z-40" data-auth-only>
      <button data-nav="closet" class="active">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span class="btm-nav-label text-xs">Closet</span>
      </button>
      <button data-nav="log-play">
        <i data-lucide="plus-circle" class="w-5 h-5"></i>
        <span class="btm-nav-label text-xs">Log Play</span>
      </button>
      <button data-nav="history">
        <i data-lucide="trophy" class="w-5 h-5"></i>
        <span class="btm-nav-label text-xs">History</span>
      </button>
    </nav>
  </div>

  <!-- Scripts: load order matters -->
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="helpers.js"></script>
  <script src="auth.js"></script>
  <script src="games.js"></script>
  <script src="collection.js"></script>
  <script src="game-detail.js"></script>
  <script src="plays.js"></script>
  <script src="init.js"></script>
</body>
</html>
