<!DOCTYPE html>
<html lang="en" data-theme="luxury">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoardgameBuddy</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/bgb-logo.svg" />

  <!-- DaisyUI v4 + Tailwind CSS (no build step) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Fonts: Poppins (UI) + Crimson Text (display) + Fraunces / JetBrains Mono (polaroid card) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Crimson+Text:wght@400;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;0,9..144,800;1,9..144,500&family=JetBrains+Mono:wght@500;700&display=swap" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="max-w-[480px] mx-auto min-h-screen flex flex-col">

    <!-- Global app header — persists across views once the user is signed in.
         Brand on the left routes back to the feed; avatar on the right opens
         the user's profile. Hidden on splash / auth via data-auth-only. -->
    <header data-auth-only class="hidden bgb-global-header">
      <a class="bgb-global-header__brand" onclick="window.router.go('feed')">
        <img src="assets/brand/bgb-logo.svg" alt="" class="bgb-global-header__logo" />
        <div class="bgb-global-header__text">
          <span class="bgb-global-header__title font-display">BoardgameBuddy</span>
          <!-- The BGG mark already reads "Powered by BoardGameGeek" — no
               additional text needed. It sits flush-right against the title
               so its right edge lines up with the wordmark. -->
          <a class="bgb-global-header__bgg" href="https://boardgamegeek.com"
             target="_blank" rel="noopener noreferrer"
             onclick="event.stopPropagation()"
             aria-label="Powered by BoardGameGeek">
            <img src="assets/credits/bgg-logo.svg" alt="Powered by BoardGameGeek" />
          </a>
        </div>
      </a>
      <button class="bgb-global-header__avatar" title="Settings"
              onclick="window.router.go('settings')">
        <span id="bgb-global-avatar" class="avatar-bubble">?</span>
      </button>
    </header>

    <!-- ── Views ────────────────────────────────────────────────────────────── -->
    <main data-view="splash" class="flex-1 px-4 py-4 flex flex-col items-center justify-center min-h-[60vh]"></main>
    <main data-view="auth" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="feed" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="log-play" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="play-flow" class="hidden flex-1 px-0 py-0"></main>
    <main data-view="join-session" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="game-detail" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="reference-guide-add" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="profile-self" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="profile-other" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="play-detail" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="session-viewer" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="buddies" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="settings" class="hidden flex-1 px-4 py-4"></main>
    <main data-view="admin" class="hidden flex-1 px-4 py-4"></main>

    <!-- Toast -->
    <div id="toast" class="toast toast-end toast-top hidden z-50"></div>
  </div>

  <!-- Bottom nav: floating bar + raised Create button.
       Feed and Profile are flanking tabs; Play is a raised gold disc that
       reads as the primary CTA. data-nav is the destination on tap;
       data-nav-views (when present) is a comma-separated list of view
       names that keep this tab marked active — so the Play button stays
       lit throughout play-flow, the join chooser, and the joiner's
       session-viewer mirror. -->
  <nav class="hidden bgb-nav" data-auth-only>
    <button class="bgb-nav__tab" data-nav="feed">
      <span class="bgb-nav__ico">
        <i data-lucide="home" class="w-5 h-5"></i>
      </span>
      <span class="bgb-nav__label">Feed</span>
    </button>
    <button class="bgb-nav__create" data-nav="log-play"
            data-nav-views="play-flow,log-play,join-session,session-viewer">
      <span class="bgb-nav__create-ico">
        <i data-lucide="dices" class="w-7 h-7"></i>
      </span>
      <span class="bgb-nav__create-label">Play</span>
    </button>
    <button class="bgb-nav__tab" data-nav="profile-self">
      <span class="bgb-nav__ico">
        <i data-lucide="user" class="w-5 h-5"></i>
      </span>
      <span class="bgb-nav__label">Profile</span>
    </button>
  </nav>

  <!-- Load order: config → helpers → domain → ui → views → init -->
  <script src="config.js"></script>
  <script src="helpers.js"></script>

  <!-- Domain -->
  <script src="domain/api.js"></script>
  <script src="domain/store.js"></script>
  <script src="domain/cache.js"></script>
  <script src="domain/view.js"></script>
  <script src="domain/status.js"></script>
  <script src="domain/user.js"></script>
  <script src="domain/game.js"></script>
  <script src="domain/collection.js"></script>
  <script src="domain/play.js"></script>
  <script src="domain/play-session.js"></script>
  <script src="domain/live-scores.js"></script>
  <script src="domain/session-phase.js"></script>
  <script src="domain/buddy.js"></script>
  <script src="domain/feed.js"></script>
  <script src="domain/search.js"></script>
  <script src="domain/stats.js"></script>
  <script src="domain/bgg.js"></script>
  <script src="domain/chapter.js"></script>
  <script src="domain/profile.js"></script>

  <!-- UI components -->
  <script src="ui/oauth-buttons.js"></script>
  <script src="ui/play-card.js"></script>
  <script src="ui/game-card.js"></script>
  <script src="ui/status-tag.js"></script>
  <script src="ui/buddies-panel.js"></script>
  <script src="ui/markdown.js"></script>
  <script src="ui/polaroid-popup.js"></script>

  <!-- Widgets -->
  <script src="widgets/reference-guide-scroll.js"></script>

  <!-- Views -->
  <script src="views/splash-view.js"></script>
  <script src="views/auth-view.js"></script>
  <script src="views/feed-view.js"></script>
  <script src="views/log-play-view.js"></script>
  <script src="views/play-flow-view.js"></script>
  <script src="views/join-session-view.js"></script>
  <script src="views/game-detail-view.js"></script>
  <script src="views/reference-guide-add-view.js"></script>
  <script src="views/profile-self-view.js"></script>
  <script src="views/profile-other-view.js"></script>
  <script src="views/play-detail-view.js"></script>
  <script src="views/session-viewer-view.js"></script>
  <script src="views/buddies-view.js"></script>
  <script src="views/settings-view.js"></script>
  <script src="views/admin-view.js"></script>

  <script src="init.js"></script>
</body>
</html>
