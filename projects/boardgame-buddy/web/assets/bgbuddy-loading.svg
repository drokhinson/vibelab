<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0b"/>
      <stop offset="100%" stop-color="#2a1812"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" />

  <!-- Whole character group (for bounce) -->
  <g id="buddy">

    <!-- Bounce animation -->
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 0,-14; 0,0"
      keyTimes="0; 0.5; 1"
      dur="1.4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
    />

    <!-- Head group: bobs side-to-side around the neck pivot at (256, 280) -->
    <g id="head">
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="-6 256 280; 6 256 280; -6 256 280"
        keyTimes="0; 0.5; 1"
        dur="2.4s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
      />

      <!-- Head -->
      <rect x="176" y="120" width="160" height="160" rx="32" fill="url(#accent)" />

      <!-- Eyes (static — no blink) -->
      <g id="eyes">
        <circle cx="220" cy="190" r="10" fill="#1a0f0b"/>
        <circle cx="292" cy="190" r="10" fill="#1a0f0b"/>
      </g>

      <!-- Smile -->
      <path d="M220 230 Q256 260 292 230"
            stroke="#1a0f0b"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"/>
    </g>

    <!-- Body -->
    <g fill="url(#accent)">
      <circle cx="256" cy="310" r="26"/>
      <rect x="226" y="330" width="60" height="40" rx="16"/>
      <rect x="206" y="360" width="100" height="24" rx="12"/>
    </g>

  </g>
</svg>
