<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Boardgame Buddy — finishing sign-in…</title>
  <style>
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d14;
      color: #F5EFE3;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 380px;
      text-align: center;
      background: #1b1822;
      border: 1px solid #2c2735;
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    }
    h1 { font-size: 18px; margin: 0 0 8px; color: #C9922A; font-family: 'Crimson Text', Georgia, serif; }
    p { font-size: 14px; line-height: 20px; color: #C9C2B0; margin: 0 0 14px; }
    .pill {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #C9922A;
      color: #0d0d14;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .err { color: #E07A5F; background: rgba(166,93,44,0.18); padding: 10px; border-radius: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Almost there…</h1>
    <p id="status">Returning you to Boardgame Buddy.</p>
    <div id="cta-wrap" style="display:none">
      <a id="cta" class="pill" href="#">Open Boardgame Buddy</a>
    </div>
  </div>
  <script>
    // Bridge between Supabase OAuth and the Boardgame Buddy native app.
    //
    // Two response shapes can land here:
    //   PKCE     — `?code=…` in the query string (what the native client
    //              requests).
    //   Implicit — `#access_token=…&refresh_token=…` in the fragment.
    //
    // Either way we forward the auth params to a deep link the native app
    // picks up. The native app's deep-link URL arrived here as
    // `?native_url=<encoded>`.
    (function () {
      var statusEl = document.getElementById('status');
      var ctaWrap = document.getElementById('cta-wrap');
      var ctaEl = document.getElementById('cta');

      function fail(msg) {
        statusEl.innerHTML = '<span class="err">' +
          String(msg).replace(/[<>]/g, '') + '</span>';
      }

      function readAll() {
        var bag = {};
        var qs = (location.search || '').replace(/^\?/, '');
        if (qs) {
          new URLSearchParams(qs).forEach(function (v, k) { bag[k] = v; });
        }
        var hash = (location.hash || '').replace(/^#/, '');
        if (hash) {
          hash.split('#').forEach(function (chunk) {
            new URLSearchParams(chunk).forEach(function (v, k) {
              if (bag[k] == null) bag[k] = v;
            });
          });
        }
        return bag;
      }

      var params = readAll();

      if (params.error_description || params.error) {
        fail('Sign-in failed: ' + (params.error_description || params.error));
        return;
      }

      var nativeUrl = params.native_url
        ? decodeURIComponent(params.native_url)
        : 'boardgamebuddy://auth-callback';
      delete params.native_url;

      var keep = ['code', 'access_token', 'refresh_token', 'expires_at',
                  'expires_in', 'token_type', 'provider_token',
                  'provider_refresh_token'];
      var forwarded = new URLSearchParams();
      var hasAny = false;
      for (var i = 0; i < keep.length; i++) {
        var k = keep[i];
        if (params[k] != null) {
          forwarded.set(k, params[k]);
          hasAny = true;
        }
      }
      if (!hasAny) {
        fail('No auth response in URL. Try signing in from the app again.');
        return;
      }

      var sep = nativeUrl.indexOf('?') >= 0 ? '&' : '?';
      var deepLink = nativeUrl + sep + forwarded.toString();

      try {
        window.location.replace(deepLink);
      } catch (e) {
        // fall through to the manual button
      }
      setTimeout(function () {
        statusEl.textContent = 'If Boardgame Buddy didn\'t open automatically, tap the button below.';
        ctaEl.setAttribute('href', deepLink);
        ctaWrap.style.display = 'block';
      }, 1200);
    })();
  </script>
</body>
</html>
