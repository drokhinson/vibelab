<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dwp-tile-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1C1C1E" flood-opacity="0.18"/>
    </filter>
  </defs>
  <ellipse cx="100" cy="152" rx="76" ry="5" fill="#1C1C1E" opacity="0.12"/>
  <!-- Bottom tile (D) -->
  <g filter="url(#dwp-tile-shadow)">
    <rect x="32" y="92" width="56" height="56" rx="6" fill="#FFFFFF" stroke="#4A7C7C" stroke-width="3"/>
    <text x="60" y="133" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="700" fill="#4A7C7C">D</text>
  </g>
  <!-- Middle tile (W) -->
  <g filter="url(#dwp-tile-shadow)">
    <rect x="64" y="50" width="56" height="56" rx="6" fill="#FFFFFF" stroke="#4A7C7C" stroke-width="3"/>
    <text x="92" y="91" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="700" fill="#4A7C7C">W</text>
  </g>
  <!-- Top tile (P) -->
  <g filter="url(#dwp-tile-shadow)">
    <rect x="96" y="8" width="56" height="56" rx="6" fill="#FFFFFF" stroke="#4A7C7C" stroke-width="3"/>
    <text x="124" y="49" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="700" fill="#4A7C7C">P</text>
  </g>
</svg>
