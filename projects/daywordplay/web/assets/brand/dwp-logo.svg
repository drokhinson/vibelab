<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="14" fill="#F0EDE8"/>
  <!-- Bottom tile (D) — drawn first, visually behind -->
  <rect x="10" y="36" width="22" height="22" rx="3" fill="#FFFFFF" stroke="#4A7C7C" stroke-width="2"/>
  <text x="21" y="52" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="13" font-weight="700" fill="#4A7C7C">D</text>
  <!-- Middle tile (W) -->
  <rect x="21" y="21" width="22" height="22" rx="3" fill="#FFFFFF" stroke="#4A7C7C" stroke-width="2"/>
  <text x="32" y="37" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="13" font-weight="700" fill="#4A7C7C">W</text>
  <!-- Top tile (P) — drawn last, visually in front -->
  <rect x="32" y="6" width="22" height="22" rx="3" fill="#FFFFFF" stroke="#4A7C7C" stroke-width="2"/>
  <text x="43" y="22" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="13" font-weight="700" fill="#4A7C7C">P</text>
