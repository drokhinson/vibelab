  <ellipse cx="20" cy="16" rx="7" ry="5.5" fill="#4A7C7C"/>
  <ellipse cx="32" cy="12" rx="7" ry="5.5" fill="#3A6A6A"/>
  <ellipse cx="44" cy="16" rx="7" ry="5.5" fill="#4A7C7C"/>
