<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Scrapbook</title>
  <link rel="icon" type="image/svg+xml" href="/assets/brand/travel-scrapbook-logo.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FFF9F2" />

  <!-- DaisyUI v4 + Tailwind CSS (no build step) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons (SVG icon set) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Supabase JS (auth) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Google Fonts: Nunito (body) + Caveat (handwritten display) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@500;700&display=swap" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="ts-header" data-auth-only>
    <a href="/" class="ts-header__brand" data-route="trips">
      <img src="/assets/brand/travel-scrapbook-logo.svg" alt="" class="ts-header__logo" />
      <span class="ts-header__title">Travel Scrapbook</span>
    </a>
    <nav class="ts-header__nav">
      <button data-nav="trips" data-route="trips" aria-label="My trips"><i data-lucide="map"></i></button>
      <button data-nav="inbox" data-route="inbox" aria-label="Wander List" style="position:relative;">
        <i data-lucide="heart"></i>
        <span class="nav-badge hidden" id="inbox-badge"></span>
      </button>
      <button data-nav="visited" data-route="visited" aria-label="Visited"><i data-lucide="circle-check"></i></button>
      <button data-nav="community" data-route="community" aria-label="Community"><i data-lucide="compass"></i></button>
      <button data-nav="settings" data-route="settings" aria-label="Settings"><i data-lucide="settings-2"></i></button>
    </nav>
  </header>

  <main id="app">
    <section data-view="login" class="hidden"></section>
    <section data-view="trips" class="hidden"></section>
    <section data-view="trip" class="hidden"></section>
    <section data-view="inbox" class="hidden"></section>
    <section data-view="visited" class="hidden"></section>
    <section data-view="community" class="hidden"></section>
    <section data-view="scrap" class="hidden"></section>
    <section data-view="share" class="hidden"></section>
    <section data-view="settings" class="hidden"></section>
    <section data-view="splash">
      <div class="ts-splash">
        <img src="/assets/brand/travel-scrapbook-logo.svg" alt="" class="ts-splash__logo" />
        <p class="ts-splash__text">Unpacking your scrapbook…</p>
      </div>
    </section>
  </main>

  <div id="toast-root"></div>

  <!-- Script order matters (no ES modules): config → store → helpers → auth
       → domain → ui → widgets → views → init -->
  <script src="config.js"></script>
  <script src="domain/store.js"></script>
  <script src="helpers.js"></script>
  <script src="auth.js"></script>
  <script src="domain/api.js"></script>
  <script src="domain/view.js"></script>
  <script src="domain/trip.js"></script>
  <script src="domain/scrap.js"></script>
  <script src="domain/source.js"></script>
  <script src="domain/route.js"></script>
  <script src="domain/share.js"></script>
  <script src="ui/sprites.js"></script>
  <script src="ui/oauth-buttons.js"></script>
  <script src="ui/category-badge.js"></script>
  <script src="ui/trip-card.js"></script>
  <script src="ui/scrap-card.js"></script>
  <script src="ui/scrap-groups.js"></script>
  <script src="ui/source-card.js"></script>
  <script src="ui/route-stop.js"></script>
  <script src="ui/route-panel.js"></script>
  <script src="ui/trip-timeline.js"></script>
  <script src="ui/place-card.js"></script>
  <script src="ui/filter-bar.js"></script>
  <script src="widgets/quick-paste.js"></script>
  <script src="widgets/trip-share.js"></script>
  <script src="widgets/plan-scheduler.js"></script>
  <script src="widgets/priority-picker.js"></script>
  <script src="widgets/note-popup.js"></script>
  <script src="widgets/scrap-editor.js"></script>
  <script src="widgets/trip-editor.js"></script>
  <script src="widgets/add-plans.js"></script>
  <script src="widgets/anchor-editor.js"></script>
  <script src="widgets/tutorial-carousel.js"></script>
  <script src="views/login-view.js"></script>
  <script src="views/trips-view.js"></script>
  <script src="views/trip-view.js"></script>
  <script src="views/inbox-view.js"></script>
  <script src="views/visited-view.js"></script>
  <script src="views/community-view.js"></script>
  <script src="views/scrap-popup-view.js"></script>
  <script src="views/share-view.js"></script>
  <script src="views/settings-view.js"></script>
  <script src="init.js"></script>
</body>
</html>
