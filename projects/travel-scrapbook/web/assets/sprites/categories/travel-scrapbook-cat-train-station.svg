<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Train station: friendly locomotive front sticker -->
  <circle cx="32" cy="32" r="30" fill="#FFFFFF"/>
  <circle cx="32" cy="32" r="27" fill="#FBE3C6"/>
  <g stroke="#5B5468" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- body -->
    <rect x="20" y="16" width="24" height="26" rx="6" fill="#FFF9F2"/>
    <!-- windshield -->
    <rect x="24" y="20" width="16" height="9" rx="3" fill="#CDE4F5"/>
    <!-- headlight band -->
    <path d="M20 34 h24" fill="none"/>
    <circle cx="32" cy="38" r="2.2" fill="#FDE9A9"/>
    <!-- buffers/wheels -->
    <circle cx="25" cy="46" r="3" fill="#F9C5D1"/>
    <circle cx="39" cy="46" r="3" fill="#F9C5D1"/>
    <!-- rails -->
    <path d="M16 52 h32" fill="none" stroke-width="2" opacity="0.6"/>
  </g>
  <ellipse cx="32" cy="53.5" rx="14" ry="2" fill="#5B5468" opacity="0.12"/>
</svg>
