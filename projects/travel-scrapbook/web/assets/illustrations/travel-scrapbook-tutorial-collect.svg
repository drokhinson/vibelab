<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial: collect scraps — a phone shares a card that flies into the suitcase -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="124" rx="66" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>

    <!-- phone -->
    <g transform="rotate(-6 52 74)">
      <rect x="30" y="30" width="44" height="84" rx="9" fill="#FFF9F2" stroke-width="3"/>
      <line x1="44" y1="38" x2="60" y2="38" stroke-width="2.5"/>
      <!-- reel/post on screen -->
      <rect x="36" y="46" width="32" height="26" rx="3" fill="#BDE0FE" stroke-width="2"/>
      <path d="M48 55l8 4-8 4z" fill="#FFF9F2" stroke-width="1.6"/>
      <rect x="36" y="78" width="22" height="4.5" rx="2.25" fill="#F9C5D1" stroke="none"/>
      <rect x="36" y="87" width="16" height="4" rx="2" fill="#BEE7D0" stroke="none"/>
      <!-- share arrow from the screen -->
      <path d="M62 88c8-2 14-8 16-16" fill="none" stroke-width="2.5"/>
      <path d="M76 78l2-6-6 2" fill="none" stroke-width="2.5"/>
    </g>

    <!-- flying scrap card -->
    <g transform="rotate(10 106 52)">
      <rect x="90" y="40" width="34" height="24" rx="3" fill="#FFF9F2" stroke-width="2.5"/>
      <rect x="95" y="45" width="16" height="4" rx="2" fill="#F9C5D1" stroke="none"/>
      <rect x="95" y="53" width="12" height="3.5" rx="1.75" fill="#BDE0FE" stroke="none"/>
      <path d="M118 45c1.6-1.1 2.5-1.9 2.5-2.9a1.3 1.3 0 0 0-2.5-.5 1.3 1.3 0 0 0-2.5.5c0 1 .9 1.8 2.5 2.9z" fill="#F4A988" stroke-width="0.8"/>
    </g>
    <!-- motion trail -->
    <path d="M104 74c8 6 18 10 28 12" fill="none" stroke-dasharray="2 6" stroke-width="2.4" opacity="0.6"/>

    <!-- suitcase (brand mark, simplified) -->
    <g transform="translate(138 62)">
      <rect x="0" y="10" width="46" height="34" rx="8" fill="#F9C5D1" stroke-width="3"/>
      <path d="M15 10V6a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v4" fill="none" stroke-width="3"/>
      <line x1="11" y1="10" x2="11" y2="44" stroke-width="2.5"/>
      <line x1="35" y1="10" x2="35" y2="44" stroke-width="2.5"/>
      <!-- open-mouth slot catching the card -->
      <rect x="14" y="16" width="18" height="5" rx="2.5" fill="#FFF9F2" stroke-width="1.6"/>
      <rect x="30" y="2" width="15" height="6.5" rx="1.5" transform="rotate(20 37 5)" fill="#BEE7D0" opacity="0.9" stroke="none"/>
    </g>

    <!-- sparkles -->
    <path d="M132 26l1.4 3.6 3.6 1.4-3.6 1.4-1.4 3.6-1.4-3.6-3.6-1.4 3.6-1.4z" fill="#FDE9A9" stroke-width="1.1"/>
    <path d="M172 44l1.1 2.9 2.9 1.1-2.9 1.1-1.1 2.9-1.1-2.9-2.9-1.1 2.9-1.1z" fill="#DCD0F2" stroke-width="1"/>
  </g>
</svg>
