<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial (iPhone only): the share shortcut — a phone shows the iOS Share
       glyph and a share sheet; a key "token" unlocks sending links straight in -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="124" rx="64" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>

    <!-- phone -->
    <g transform="rotate(-4 96 72)">
      <rect x="68" y="26" width="52" height="92" rx="11" fill="#FFF9F2" stroke-width="3"/>
      <line x1="86" y1="34" x2="102" y2="34" stroke-width="2.5"/>

      <!-- iOS share glyph on screen: box with an up arrow -->
      <path d="M84 60v18a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V60" fill="none" stroke-width="3"/>
      <line x1="94" y1="46" x2="94" y2="70" stroke-width="3"/>
      <path d="M88 52l6-6 6 6" fill="none" stroke-width="3"/>

      <!-- share sheet sliding up from the bottom, app row -->
      <rect x="72" y="92" width="44" height="22" rx="5" fill="#BDE0FE" stroke-width="2.5"/>
      <rect x="78" y="99" width="9" height="9" rx="2.5" fill="#FFF9F2" stroke-width="1.8"/>
      <!-- the app (suitcase mark), highlighted -->
      <rect x="90" y="98" width="11" height="11" rx="3" fill="#F9C5D1" stroke-width="1.8"/>
      <path d="M93 98v-1.4a1.6 1.6 0 0 1 1.6-1.6h1.8a1.6 1.6 0 0 1 1.6 1.6V98" fill="none" stroke-width="1.6"/>
      <rect x="104" y="99" width="9" height="9" rx="2.5" fill="#FFF9F2" stroke-width="1.8"/>
    </g>

    <!-- token: a key that unlocks the shortcut -->
    <g transform="rotate(20 150 44)">
      <circle cx="150" cy="44" r="11" fill="#BEE7D0" stroke-width="3"/>
      <circle cx="150" cy="44" r="3.6" fill="#FFF9F2" stroke-width="2"/>
      <line x1="158.5" y1="50.5" x2="176" y2="68" stroke-width="3"/>
      <line x1="169" y1="61" x2="164.5" y2="65.5" stroke-width="3"/>
      <line x1="176" y1="68" x2="171.5" y2="72.5" stroke-width="3"/>
    </g>
    <!-- token → phone trail (granted access) -->
    <path d="M138 56c-8 4-16 8-22 14" fill="none" stroke-dasharray="2 6" stroke-width="2.4" opacity="0.6"/>

    <!-- sparkles -->
    <path d="M128 30l1.3 3.4 3.4 1.3-3.4 1.3-1.3 3.4-1.3-3.4-3.4-1.3 3.4-1.3z" fill="#FDE9A9" stroke-width="1.1"/>
    <path d="M170 88l1.1 2.9 2.9 1.1-2.9 1.1-1.1 2.9-1.1-2.9-2.9-1.1 2.9-1.1z" fill="#DCD0F2" stroke-width="1"/>
  </g>
</svg>
