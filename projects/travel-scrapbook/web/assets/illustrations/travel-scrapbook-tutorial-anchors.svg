<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial: anchor your trip — arrival plane, hotel stay, departure plane along a dotted path -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="124" rx="66" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>

    <!-- the route between anchors -->
    <path d="M36 92C60 66 84 96 100 76s40-30 64-36" fill="none" stroke-dasharray="1 7" stroke-width="2.6" opacity="0.75"/>

    <!-- arrival: landing plane pin -->
    <g transform="translate(30 86)">
      <circle r="15" fill="#BDE0FE" stroke-width="2.5"/>
      <g transform="rotate(20)">
        <path d="M-8 1h9l5-5 2.5 1-3 5.5 3 1.5 3-2 1.5 1.5-4 5-17-3z" fill="#FFF9F2" stroke-width="1.6"/>
      </g>
      <line x1="-9" y1="11" x2="9" y2="11" stroke-width="2"/>
    </g>

    <!-- stay: hotel/bed pin -->
    <g transform="translate(102 72)">
      <circle r="15" fill="#FDE9A9" stroke-width="2.5"/>
      <path d="M-9 5V-5" fill="none" stroke-width="2.4"/>
      <path d="M-9 1h13a5 5 0 0 1 5 5v0" fill="none" stroke-width="2.4"/>
      <circle cx="-4.5" cy="-2" r="2.6" fill="#F4A988" stroke-width="1.6"/>
      <line x1="-9" y1="7" x2="9" y2="7" stroke-width="2.4"/>
    </g>

    <!-- departure: climbing plane pin -->
    <g transform="translate(170 42)">
      <circle r="15" fill="#F9C5D1" stroke-width="2.5"/>
      <g transform="rotate(-24)">
        <path d="M-8 1h9l5-5 2.5 1-3 5.5 3 1.5 3-2 1.5 1.5-4 5-17-3z" fill="#FFF9F2" stroke-width="1.6"/>
      </g>
    </g>

    <!-- little scrap stops ordered between anchors -->
    <circle cx="66" cy="80" r="5" fill="#BEE7D0" stroke-width="2"/>
    <circle cx="136" cy="56" r="5" fill="#BEE7D0" stroke-width="2"/>

    <!-- sparkle -->
    <path d="M52 34l1.4 3.6 3.6 1.4-3.6 1.4-1.4 3.6-1.4-3.6-3.6-1.4 3.6-1.4z" fill="#DCD0F2" stroke-width="1.1"/>
  </g>
</svg>
