<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Travel Scrapbook hero: sticker-style suitcase with washi-taped travel scraps -->
  <ellipse cx="100" cy="166" rx="66" ry="6" fill="#5B5468" opacity="0.08"/>

  <!-- photo scrap (peeking behind, top-left) -->
  <g transform="rotate(-10 62 72)" stroke-linecap="round" stroke-linejoin="round">
    <rect x="34" y="40" width="56" height="66" rx="4" fill="#FFFFFF" stroke="#5B5468" stroke-width="2.5"/>
    <rect x="39" y="45" width="46" height="40" rx="2" fill="#BDE0FE"/>
    <circle cx="74" cy="57" r="6" fill="#FDE9A9"/>
    <path d="M39 85 L52 63 L62 78 L70 68 L85 85 Z" fill="#BEE7D0"/>
    <line x1="40" y1="94" x2="76" y2="94" stroke="#5B5468" stroke-width="2" opacity="0.45"/>
    <line x1="40" y1="100" x2="64" y2="100" stroke="#5B5468" stroke-width="2" opacity="0.3"/>
    <rect x="48" y="33" width="28" height="9" rx="1.5" fill="#F4A988" opacity="0.9" stroke="#5B5468" stroke-width="0.8"/>
  </g>

  <!-- postcard scrap (peeking behind, top-right) -->
  <g transform="rotate(9 148 60)" stroke-linecap="round" stroke-linejoin="round">
    <rect x="116" y="38" width="60" height="44" rx="4" fill="#FFFFFF" stroke="#5B5468" stroke-width="2.5"/>
    <line x1="150" y1="43" x2="150" y2="77" stroke="#5B5468" stroke-width="1.5" opacity="0.5"/>
    <rect x="156" y="43" width="14" height="12" rx="1.5" fill="#FDE9A9" stroke="#5B5468" stroke-width="1.2"/>
    <path d="M163 52c-1.6-1.2-2.5-1.9-2.5-3a1.3 1.3 0 0 1 2.5-.55 1.3 1.3 0 0 1 2.5.55c0 1.1-.9 1.8-2.5 3z" fill="#F4A988" stroke="#5B5468" stroke-width="0.7"/>
    <line x1="122" y1="52" x2="144" y2="52" stroke="#5B5468" stroke-width="2" opacity="0.4"/>
    <line x1="122" y1="59" x2="146" y2="59" stroke="#5B5468" stroke-width="2" opacity="0.3"/>
    <line x1="122" y1="66" x2="140" y2="66" stroke="#5B5468" stroke-width="2" opacity="0.3"/>
    <rect x="120" y="31" width="26" height="9" rx="1.5" fill="#BEE7D0" opacity="0.9" stroke="#5B5468" stroke-width="0.8"/>
  </g>

  <!-- suitcase (front) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <rect x="60" y="82" width="80" height="60" rx="12" fill="#F9C5D1" stroke="#5B5468" stroke-width="3"/>
    <rect x="66" y="88" width="68" height="48" rx="8" fill="none" stroke="#5B5468" stroke-width="1.2" opacity="0.35"/>
    <path d="M86 82v-5a4 4 0 0 1 4-4h20a4 4 0 0 1 4 4v5" fill="none" stroke="#5B5468" stroke-width="3"/>
    <line x1="78" y1="82" x2="78" y2="142" stroke="#5B5468" stroke-width="3"/>
    <line x1="122" y1="82" x2="122" y2="142" stroke="#5B5468" stroke-width="3"/>
    <rect x="74" y="104" width="8" height="6" rx="1.5" fill="#FDE9A9" stroke="#5B5468" stroke-width="1.2"/>
    <rect x="118" y="104" width="8" height="6" rx="1.5" fill="#FDE9A9" stroke="#5B5468" stroke-width="1.2"/>
  </g>

  <!-- heart luggage tag -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <circle cx="64" cy="134" r="9" fill="#FFFFFF"/>
    <circle cx="64" cy="134" r="7" fill="#FDE9A9" stroke="#5B5468" stroke-width="2"/>
    <path d="M64 137.6c-2.3-1.7-3.6-2.8-3.6-4.3a1.9 1.9 0 0 1 3.6-.8 1.9 1.9 0 0 1 3.6.8c0 1.5-1.3 2.6-3.6 4.3z" fill="#F4A988" stroke="#5B5468" stroke-width="1"/>
  </g>

  <!-- sparkles -->
  <path d="M100 19 L102 24 L107 26 L102 28 L100 33 L98 28 L93 26 L98 24 Z" fill="#BDE0FE" stroke="#5B5468" stroke-width="0.8" stroke-linejoin="round"/>
  <path d="M152 114 L153.8 118.2 L158 120 L153.8 121.8 L152 126 L150.2 121.8 L146 120 L150.2 118.2 Z" fill="#BDE0FE" stroke="#5B5468" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
