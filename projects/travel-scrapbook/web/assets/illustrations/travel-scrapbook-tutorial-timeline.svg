<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial: the day-by-day timeline — a dotted day spine with arrival, a booked plan at a time, and a stay -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="126" rx="62" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>

    <!-- vertical day spine -->
    <line x1="56" y1="26" x2="56" y2="114" stroke-dasharray="1 7" stroke-width="2.6" opacity="0.75"/>

    <!-- day 1: arrival -->
    <g transform="translate(56 34)">
      <circle r="10" fill="#BDE0FE" stroke-width="2.4"/>
      <g transform="rotate(20) scale(0.75)">
        <path d="M-8 1h9l5-5 2.5 1-3 5.5 3 1.5 3-2 1.5 1.5-4 5-17-3z" fill="#FFF9F2" stroke-width="1.6"/>
      </g>
    </g>
    <rect x="76" y="24" width="64" height="20" rx="7" fill="#FFFFFF" stroke-width="2"/>
    <line x1="83" y1="34" x2="121" y2="34" stroke-width="2.6" opacity="0.6"/>

    <!-- day 2: a booked plan with a clock time -->
    <g transform="translate(56 70)">
      <circle r="10" fill="#BEE7D0" stroke-width="2.4"/>
      <circle r="4.6" fill="#FFF9F2" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="0" y2="-3" stroke-width="1.4"/>
      <line x1="0" y1="0" x2="2.2" y2="1.4" stroke-width="1.4"/>
    </g>
    <rect x="76" y="60" width="88" height="20" rx="7" fill="#BEE7D0" stroke-width="2.4"/>
    <rect x="82" y="65" width="22" height="10" rx="4" fill="#FFF9F2" stroke-width="1.5"/>
    <line x1="86" y1="70" x2="100" y2="70" stroke-width="1.8" opacity="0.6"/>
    <line x1="110" y1="70" x2="152" y2="70" stroke-width="2.6" opacity="0.6"/>

    <!-- day 3: hotel stay -->
    <g transform="translate(56 106)">
      <circle r="10" fill="#FDE9A9" stroke-width="2.4"/>
      <path d="M-5 3v-6" fill="none" stroke-width="1.8"/>
      <path d="M-5 -1h7a3.4 3.4 0 0 1 3.4 3.4v.6" fill="none" stroke-width="1.8"/>
      <line x1="-5" y1="4" x2="5.5" y2="4" stroke-width="1.8"/>
    </g>
    <rect x="76" y="96" width="56" height="20" rx="7" fill="#FFFFFF" stroke-width="2"/>
    <line x1="83" y1="106" x2="113" y2="106" stroke-width="2.6" opacity="0.6"/>

    <!-- an unscheduled plan sliding in with an arrow -->
    <g transform="rotate(6 166 40)">
      <rect x="148" y="30" width="34" height="20" rx="7" fill="#F9C5D1" stroke-width="2.2"/>
      <path d="M158 36c4 0 6.5 2.7 6.5 6 0 1.6-.7 3.2-1.6 4.5" fill="none" stroke-width="0" />
      <circle cx="165" cy="40" r="4" fill="#FFF9F2" stroke-width="1.6"/>
    </g>
    <path d="M160 56c-4 10-14 12-20 10" fill="none" stroke-width="2.2" stroke-dasharray="1 6"/>
    <path d="M144 62l-5 5 7 1z" fill="#5B5468" stroke-width="1"/>

    <!-- sparkle -->
    <path d="M34 78l1.4 3.6 3.6 1.4-3.6 1.4-1.4 3.6-1.4-3.6-3.6-1.4 3.6-1.4z" fill="#DCD0F2" stroke-width="1.1"/>
  </g>
</svg>
