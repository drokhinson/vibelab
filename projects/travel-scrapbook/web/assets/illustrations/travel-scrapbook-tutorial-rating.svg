<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial: rate your Wander List — a place card with the 4-level priority control, Must-do starred -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="126" rx="62" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>

    <!-- the place card, slightly tilted like a sticker -->
    <g transform="rotate(-3 100 70)">
      <rect x="46" y="26" width="108" height="88" rx="12" fill="#FFFFFF" stroke-width="2.6"/>
      <!-- washi tape -->
      <rect x="86" y="18" width="30" height="14" rx="3" fill="#DCD0F2" opacity="0.85" stroke-width="1.4" transform="rotate(-4 101 25)"/>
      <!-- photo area with a pin -->
      <rect x="54" y="36" width="92" height="34" rx="8" fill="#BDE0FE" stroke-width="2"/>
      <path d="M100 44c5 0 8.5 3.6 8.5 8 0 6-8.5 13-8.5 13s-8.5-7-8.5-13c0-4.4 3.5-8 8.5-8z" fill="#F9C5D1" stroke-width="2"/>
      <circle cx="100" cy="52" r="2.6" fill="#FFF9F2" stroke-width="1.4"/>
      <!-- title squiggle -->
      <line x1="56" y1="79" x2="118" y2="79" stroke-width="3" opacity="0.7"/>
      <line x1="56" y1="86" x2="96" y2="86" stroke-width="2" opacity="0.4"/>
      <!-- the 4-segment rating row -->
      <g transform="translate(56 94)">
        <rect width="20" height="14" rx="5" fill="#FFF9F2" stroke-width="1.8"/>
        <rect x="23" width="20" height="14" rx="5" fill="#F9C5D1" stroke-width="2.2"/>
        <rect x="46" width="20" height="14" rx="5" fill="#FFF9F2" stroke-width="1.8"/>
        <rect x="69" width="20" height="14" rx="5" fill="#FFF9F2" stroke-width="1.8"/>
        <!-- calendar-check / star / thumb / slash marks -->
        <rect x="6" y="3.4" width="8" height="7.4" rx="1.6" fill="none" stroke-width="1.4"/>
        <path d="M30 9.4l1.9-4.6 1.9 4.6 4.6.4-3.5 3-1 4.5-3.9-2.4-3.9 2.4 1-4.5-3.5-3z"
              transform="translate(2.5 -4) scale(0.85)" fill="#FFF9F2" stroke-width="1.4"/>
        <path d="M52 8.6l3 3 5-5" fill="none" stroke-width="1.5"/>
        <circle cx="79" cy="7" r="4.4" fill="none" stroke-width="1.4"/>
        <line x1="76" y1="10" x2="82" y2="4" stroke-width="1.4"/>
      </g>
    </g>

    <!-- a big star popping off the chosen segment -->
    <path d="M156 44l3.2 8 8 3.2-8 3.2-3.2 8-3.2-8-8-3.2 8-3.2z" fill="#FDE9A9" stroke-width="2"/>
    <!-- sparkles -->
    <path d="M36 44l1.4 3.6 3.6 1.4-3.6 1.4-1.4 3.6-1.4-3.6-3.6-1.4 3.6-1.4z" fill="#BEE7D0" stroke-width="1.1"/>
    <path d="M168 96l1.2 3 3 1.2-3 1.2-1.2 3-1.2-3-3-1.2 3-1.2z" fill="#DCD0F2" stroke-width="1.1"/>
  </g>
</svg>
