<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial: paste a link — link card sliding into an input, scissors trimming it in -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="122" rx="64" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>
    <rect x="30" y="70" width="140" height="30" rx="15" fill="#FFFFFF" stroke-width="3"/>
    <path d="M46 85h60" stroke-width="2.4" opacity="0.5" stroke-dasharray="1 5"/>
    <rect x="130" y="76" width="30" height="18" rx="9" fill="#F9C5D1" stroke-width="2.5"/>
    <!-- incoming link card -->
    <g transform="rotate(-6 80 40)">
      <rect x="50" y="24" width="60" height="34" rx="6" fill="#FFF9F2" stroke-width="2.5"/>
      <rect x="58" y="32" width="26" height="18" rx="3" fill="#BDE0FE" stroke="none"/>
      <path d="M90 34h12M90 40h16M90 46h10" stroke-width="1.8" opacity="0.6"/>
    </g>
    <path d="M80 60c4 6 8 8 10 10" fill="none" stroke-dasharray="1 5" stroke-width="2.2" opacity="0.7"/>
    <!-- scissors -->
    <g transform="rotate(24 150 40)">
      <circle cx="134" cy="34" r="5" fill="#DCD0F2" stroke-width="2"/>
      <circle cx="134" cy="48" r="5" fill="#DCD0F2" stroke-width="2"/>
      <path d="M138 36l24 6M138 46l24-6" stroke-width="2.4"/>
    </g>
    <path d="M40 34l1.5 4 4 1.5-4 1.5-1.5 4-1.5-4-4-1.5 4-1.5z" fill="#FDE9A9" stroke-width="1.2"/>
  </g>
</svg>
