<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Tutorial: bookmarklet — browser window with the Scrap-it chip dragging to the bookmarks bar -->
  <g stroke="#5B5468" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="100" cy="122" rx="66" ry="7" fill="#5B5468" opacity="0.08" stroke="none"/>
    <rect x="28" y="24" width="144" height="88" rx="10" fill="#FFFFFF" stroke-width="3"/>
    <path d="M28 40h144" stroke-width="2.5"/>
    <circle cx="38" cy="32" r="3" fill="#F9C5D1" stroke="none"/>
    <circle cx="48" cy="32" r="3" fill="#FDE9A9" stroke="none"/>
    <circle cx="58" cy="32" r="3" fill="#BEE7D0" stroke="none"/>
    <!-- bookmarks bar -->
    <rect x="34" y="46" width="46" height="9" rx="4.5" fill="#F0E4D7" stroke-width="1.6"/>
    <rect x="86" y="46" width="34" height="9" rx="4.5" fill="#F0E4D7" stroke-width="1.6"/>
    <!-- page content lines -->
    <path d="M40 68h80M40 78h60M40 88h70M40 98h40" stroke-width="2" opacity="0.35"/>
    <!-- scrap-it chip dragging up -->
    <g transform="rotate(-8 138 92)">
      <rect x="118" y="80" width="60" height="24" rx="12" fill="#F9C5D1" stroke-width="2.5"/>
      <circle cx="132" cy="92" r="6" fill="#FFF9F2" stroke-width="1.8"/>
      <path d="M129 89l6 6M135 89l-6 6" stroke-width="1.6"/>
      <path d="M144 88h24M144 96h16" stroke-width="1.8" opacity="0.6"/>
    </g>
    <path d="M118 70c-6 4-10 10-8 14" fill="none" stroke-dasharray="1 6" stroke-width="2.2" opacity="0.7"/>
  </g>
</svg>
