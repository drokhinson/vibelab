<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Travel Scrapbook — finishing sign-in…</title>
  <style>
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFF9F2; color: #5B5468; margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      max-width: 380px; text-align: center; background: #fff;
      border: 2px solid #EADFD2; border-radius: 20px; padding: 28px 24px;
      box-shadow: 0 6px 18px rgba(91, 84, 104, 0.12);
    }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 20px; color: #9B94A8; margin: 0 0 14px; }
    a.pill {
      display: inline-block; padding: 10px 18px; border-radius: 999px;
      background: #F0A3B8; color: #fff; text-decoration: none; font-weight: 700; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Finishing sign-in…</h1>
    <p>Hang tight, gluing you back into the scrapbook.</p>
    <a class="pill" href="/">Continue</a>
  </div>
  <script>
    // Forward the OAuth code to the page the user came from (`next`, set by
    // handleOAuthSignIn) so supabase-js can complete the PKCE exchange there.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var next = params.get('next') || '/';
      if (!next.startsWith('/')) next = '/';
      params.delete('next');
      var qs = params.toString(); // carries code=… (and error params, if any)
      var target = next + (qs ? (next.includes('?') ? '&' : '?') + qs : '');
      window.location.replace(target);
    })();
  </script>
</body>
</html>
