<!DOCTYPE html>
<html lang="en" data-theme="pastel">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantPlanner</title>

  <!-- DaisyUI + Tailwind CDN (no build step) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Inter (body) + Quicksand (display) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Quicksand:wght@500;600;700&display=swap" />
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Supabase JS (auth) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Three.js for 3D planter render -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <!-- PlantPlanner styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen font-sans">
  <div class="navbar bg-base-100 border-b border-base-300 px-4 sticky top-0 z-50">
    <div class="flex-1 gap-2">
      <i data-lucide="sprout" class="text-primary w-5 h-5"></i>
      <span class="text-lg font-display font-semibold text-primary">PlantPlanner</span>
    </div>
    <div class="flex-none gap-2" id="nav-right"></div>
  </div>

  <main class="max-w-[920px] mx-auto px-4 py-6">
    <div id="app">
      <div class="flex flex-col items-center justify-center py-12 text-base-content/50 gap-3">
        <span class="loading loading-spinner loading-md text-primary"></span>
        Loading...
      </div>
    </div>
  </main>

  <!-- Scripts: config → state → theme → helpers → features → init -->
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="theme.js"></script>
  <script src="helpers.js"></script>
  <script src="auth.js"></script>
  <script src="gardens.js"></script>
  <script src="catalog.js"></script>
  <script src="garden.js"></script>
  <script src="plant-data.js"></script>
  <script src="plant-models.js"></script>
  <script src="plant-sprites.js"></script>
  <script src="render3d.js"></script>
  <script src="plant-thumbnails.js"></script>
  <script src="touch-drag.js"></script>
  <script src="init.js"></script>
</body>
</html>
