<!DOCTYPE html>
<html lang="en" data-theme="dark" data-color-scheme="golden">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlantPlanner</title>

  <!-- Apply saved theme before render to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem("pp_theme") || "golden";
      var dark = t === "golden";
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      document.documentElement.setAttribute("data-color-scheme", t);
    })();
  </script>

  <!-- Pico.css — classless CSS framework -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" />
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- PlantPlanner styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <nav>
      <ul><li><strong>PlantPlanner</strong></li></ul>
      <ul id="nav-right"></ul>
    </nav>
  </header>

  <main>
    <div id="app">
      <div class="loading">Loading…</div>
    </div>
  </main>

  <!-- Scripts: config → state → theme → helpers → features → init -->
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="theme.js"></script>
  <script src="helpers.js"></script>
  <script src="auth.js"></script>
  <script src="gardens.js"></script>
  <script src="catalog.js"></script>
  <script src="garden.js"></script>
  <script src="init.js"></script>
</body>
</html>
