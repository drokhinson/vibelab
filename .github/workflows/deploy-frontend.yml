name: Deploy Project Frontends

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project name to deploy (e.g. sauceboss, plant-planner)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute project key
        id: key
        run: |
          KEY=$(echo "${{ inputs.project }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          echo "projectKey=$KEY" >> $GITHUB_OUTPUT

      - name: Deploy ${{ inputs.project }} web frontend
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets[format('VERCEL_{0}_PROJECT_ID', steps.key.outputs.projectKey)] }}
          working-directory: ./projects/${{ inputs.project }}/web
          vercel-args: --prod
