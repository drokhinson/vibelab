name: Deploy Project Frontends

on:
  push:
    branches: [main]
    paths:
      - projects/**/web/**

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: detect
        name: Detect changed projects
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep '^projects/' \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R . | jq -sc .)
          echo "matrix={\"project\":$CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed projects: $CHANGED"

  deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.matrix != '{"project":[]}'
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ${{ matrix.project }} web frontend
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          # Each project needs its own secret: VERCEL_SAUCEBOSS_PROJECT_ID, etc.
          vercel-project-id: ${{ secrets[format('VERCEL_{0}_PROJECT_ID', upper(matrix.project))] }}
          working-directory: ./projects/${{ matrix.project }}/web
          vercel-args: --prod
