name: Deploy All Project Frontends

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project: admin
            projectKey: ADMIN
          - project: daywordplay
            projectKey: DAYWORDPLAY
          - project: plant-planner
            projectKey: PLANT_PLANNER
          - project: sauceboss
            projectKey: SAUCEBOSS
          - project: spotme
            projectKey: SPOTME
          - project: wealthmate
            projectKey: WEALTHMATE
          - project: boardgame-buddy
            projectKey: BOARDGAME_BUDDY
          - project: travel-scrapbook
            projectKey: TRAVEL_SCRAPBOOK
    steps:
      - uses: actions/checkout@v4

      - name: Run project build script (if present)
        working-directory: ./projects/${{ matrix.project }}/web
        env:
          API_BASE: https://vibelab-production-2119.up.railway.app
          SUPABASE_URL: ${{ secrets.VIBELAB_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VIBELAB_SUPABASE_ANON_KEY }}
        run: |
          if [ -f build.sh ]; then bash build.sh; fi

      # Deploy-artifact-only Tailwind precompile for boardgame-buddy — keep
      # in sync with the identical step in deploy-frontend.yml. The
      # checked-in index.html keeps the DaisyUI/Tailwind CDN pair for local
      # dev; this swaps it for a minified static stylesheet in the checkout
      # that `vercel deploy` uploads. Nothing is committed back.
      - name: Precompile Tailwind + DaisyUI (boardgame-buddy only)
        if: matrix.project == 'boardgame-buddy'
        working-directory: ./projects/${{ matrix.project }}/web
        run: |
          # tailwind.config.js's require("daisyui") must resolve, so install
          # both packages into a scratch dir OUTSIDE web/ — a node_modules
          # here would ship to Vercel with the static site.
          SCRATCH=$(mktemp -d)
          npm install --prefix "$SCRATCH" --no-audit --no-fund tailwindcss@3 daisyui@4
          cat > tailwind.config.js << 'TWCONFIG'
          module.exports = {
            content: ["./**/*.{html,js}"],
            plugins: [require("daisyui")],
            // index.html pins data-theme="luxury"; no other themes are used.
            daisyui: { themes: ["luxury"] },
          };
          TWCONFIG
          # The @tailwind directives are REQUIRED: without -i the CLI emits
          # utilities only — no DaisyUI component classes and no theme vars.
          printf '@tailwind base;\n@tailwind components;\n@tailwind utilities;\n' > tailwind.input.css
          NODE_PATH="$SCRATCH/node_modules" "$SCRATCH/node_modules/.bin/tailwindcss" \
            -c tailwind.config.js -i tailwind.input.css -o assets/bgb-tw.css --minify
          # Sanity gate: fail the deploy if the DaisyUI layer is missing.
          grep -q ".btn-primary" assets/bgb-tw.css || { echo "bgb-tw.css missing DaisyUI components"; exit 1; }
          rm tailwind.config.js tailwind.input.css
          # Swap the CDN <link> + <script> pair for the precompiled sheet.
          # Anchored on the CDN URLs; fail loudly if index.html drifted.
          node << 'SWAP'
          const fs = require("fs");
          let html = fs.readFileSync("index.html", "utf8");
          const linkRe = /<link[^>]*href="https:\/\/cdn\.jsdelivr\.net\/npm\/daisyui[^"]*"[^>]*\/?>/;
          const scriptRe = /[ \t]*<script src="https:\/\/cdn\.tailwindcss\.com"><\/script>\n?/;
          if (!linkRe.test(html) || !scriptRe.test(html)) {
            console.error("DaisyUI/Tailwind CDN block not found in index.html — aborting swap");
            process.exit(1);
          }
          html = html.replace(linkRe, '<link rel="stylesheet" href="assets/bgb-tw.css" />');
          html = html.replace(scriptRe, "");
          fs.writeFileSync("index.html", html);
          console.log("index.html now uses precompiled assets/bgb-tw.css");
          SWAP

      - name: Deploy ${{ matrix.project }} web frontend
        working-directory: ./projects/${{ matrix.project }}/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[format('VERCEL_{0}_PROJECT_ID', matrix.projectKey)] }}
        run: |
          npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel@latest deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
