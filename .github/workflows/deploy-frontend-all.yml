name: Deploy All Project Frontends

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project: admin
            projectKey: ADMIN
          - project: daywordplay
            projectKey: DAYWORDPLAY
          - project: plant-planner
            projectKey: PLANT_PLANNER
          - project: sauceboss
            projectKey: SAUCEBOSS
          - project: spotme
            projectKey: SPOTME
          - project: wealthmate
            projectKey: WEALTHMATE
          - project: boardgame-buddy
            projectKey: BOARDGAME_BUDDY
    steps:
      - uses: actions/checkout@v4

      - name: Run project build script (if present)
        working-directory: ./projects/${{ matrix.project }}/web
        env:
          API_BASE: https://vibelab-production-2119.up.railway.app
          SUPABASE_URL: ${{ secrets[format('{0}_SUPABASE_URL', matrix.projectKey)] }}
          SUPABASE_ANON_KEY: ${{ secrets[format('{0}_SUPABASE_ANON_KEY', matrix.projectKey)] }}
        run: |
          if [ -f build.sh ]; then bash build.sh; fi

      - name: Deploy ${{ matrix.project }} web frontend
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets[format('VERCEL_{0}_PROJECT_ID', matrix.projectKey)] }}
          working-directory: ./projects/${{ matrix.project }}/web
          vercel-args: --prod
          github-token: ${{ github.token }}
