<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibelab</title>
  <link rel="icon" type="image/svg+xml" href="assets/brand/vibelab-logo.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Crimson+Text:wght@600;700&family=Poppins:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="wordmark">
        <svg class="logo-mark" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
          <rect class="bar" x="4"  y="7"  width="24" height="5" rx="2.5" fill="#a78bfa"/>
          <rect class="bar" x="8"  y="14" width="20" height="5" rx="2.5" fill="#8c83ff"/>
          <rect class="bar" x="12" y="21" width="16" height="5" rx="2.5" fill="#6c63ff"/>
        </svg>
        <span>vibelab</span>
      </div>
      <p class="tagline">Ideas → prototypes → native apps</p>
      <div id="admin-slot" class="admin-slot"></div>
    </div>
  </header>

  <main>
    <section id="featured" class="featured-grid"></section>

    <section class="filters" id="filters">
      <h2 class="section-heading">Back burner</h2>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="live">Live</button>
        <button class="filter-btn" data-filter="wip">In Progress</button>
        <button class="filter-btn" data-filter="deferred">Deferred</button>
      </div>
    </section>

    <section id="projects-grid" class="projects-grid">
      <div class="loading">Loading projects…</div>
    </section>
  </main>

  <footer>
    <small>Built in vibelab. Powered by Supabase, Railway &amp; Vercel.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
